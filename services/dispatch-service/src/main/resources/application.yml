server:
  port: 8083

spring:
  application:
    name: dispatch-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/emergency_db}
    username: ${SPRING_DATASOURCE_USERNAME:emergency_user}
    password: ${SPRING_DATASOURCE_PASSWORD:emergency_pass}
    hikari:
      maximum-pool-size: 10
      pool-name: DispatchServicePool

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: dispatch
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    schemas: dispatch
    locations: classpath:db/migration
    validate-on-migrate: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: dispatch-service-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.emergency.*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.emergency.dispatchservice.event.EmergencyCreatedEvent

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms

dispatch:
  max-candidates: 3
  max-search-radius-km: 50

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.emergency: DEBUG