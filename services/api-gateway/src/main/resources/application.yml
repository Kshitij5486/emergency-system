server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service-auth
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
        - id: user-service-users
          uri: http://localhost:8081
          predicates:
            - Path=/api/users/**
        - id: user-service-admin
          uri: http://localhost:8081
          predicates:
            - Path=/api/admin/**
        - id: emergency-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/incidents/**
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
  main:
    web-application-type: reactive

jwt:
  secret: ${JWT_SECRET:dev-secret-replace-in-production}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.cloud.gateway: INFO
