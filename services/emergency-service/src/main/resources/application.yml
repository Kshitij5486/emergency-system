server:
  port: 8082
spring:
  application:
    name: emergency-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/emergency_db}
    username: ${SPRING_DATASOURCE_USERNAME:emergency_user}
    password: ${SPRING_DATASOURCE_PASSWORD:emergency_pass}
    hikari:
      maximum-pool-size: 15
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: incidents
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    schemas: incidents
    locations: classpath:db/migration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
