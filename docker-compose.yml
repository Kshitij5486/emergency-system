version: "3.9"

networks:
  emergency-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:

services:

  postgres:
    image: postgres:16.3-alpine
    container_name: emergency-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-emergency_db}
      POSTGRES_USER: ${POSTGRES_USER:-emergency_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emergency_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - emergency-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emergency_user -d emergency_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7.4-alpine
    container_name: emergency-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - emergency-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
